name: Daily Market Scan

on:
  schedule:
    - cron: "35 21 * * 1-5"   # Mon-Fri, 21:35 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python scanner.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: market-scan-report
          path: report.md
