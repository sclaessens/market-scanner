name: Daily Market Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run scanner
        run: python scanner.py

      - name: Run validation
        run: python validate_scans.py

      - name: Upload reports and data
        uses: actions/upload-artifact@v4
        with:
          name: market-scan-output
          path: |
            report.md
            data/scans_log.csv
            data/scans_outcomes.csv
