name: Daily Market Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run scanner
        run: python run_scan.py

      - name: Run validation
        run: python validate_scans.py

      - name: Upload reports and data
        uses: actions/upload-artifact@v4
        with:
          name: market-scan-output
          path: |
            report.md
            data/scans_log.csv
            data/scans_outcomes.csv

      - name: Commit updated scan files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add report.md data/scans_log.csv data/scans_outcomes.csv
          git commit -m "Update daily market scan data" || echo "No changes to commit"
          git push

      - name: Send Telegram success notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Daily Market Scan completed successfully."

      - name: Send Telegram failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Daily Market Scan failed. Check GitHub Actions."
