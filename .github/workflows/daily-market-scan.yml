name: Daily Market Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * 1-5"

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance openpyxl requests

      - name: Run market scan
        run: python run_scan.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-scan-report
          path: reports/

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/*.txt data/failed_tickers.csv
          git diff --cached --quiet || git commit -m "Update market scan outputs"
          git push

      - name: Send Telegram message
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          message_path = Path("reports/telegram_message.txt")

          if not message_path.exists():
              raise FileNotFoundError("Missing reports/telegram_message.txt")

          text = message_path.read_text(encoding="utf-8").strip()

          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data={
                  "chat_id": chat_id,
                  "text": text,
              },
              timeout=30,
          )
          resp.raise_for_status()
          print("Telegram message sent successfully.")
          PY

      - name: Send Telegram failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          text = "Market Scan failed. Check GitHub Actions logs."

          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data={
                  "chat_id": chat_id,
                  "text": text,
              },
              timeout=30,
          )
          resp.raise_for_status()
          print("Telegram failure alert sent successfully.")
          PY
