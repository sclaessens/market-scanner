name: Daily Market Scan

on:
  workflow_dispatch:
  # Scheduled legacy daily scan paused during v2 cutover.
  # Re-enable only after explicit governance approval.

permissions:
  contents: read

jobs:
  canonical-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run canonical app dry-run
        run: PYTHONPATH=src python -m market_scanner.app --dry-run
